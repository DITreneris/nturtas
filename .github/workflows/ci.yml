name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm ci

      - name: Install nt-broker-ui dependencies
        run: cd nt-broker-ui && npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run docs hygiene and nt-broker-ui build + unit tests
        run: npm run test

      - name: Run nt-broker-ui e2e tests
        run: npm run test:e2e
        env:
          CI: true
          BASE_URL: http://127.0.0.1:4173/nturtas/
          WAIT_ON_TIMEOUT: 60000
