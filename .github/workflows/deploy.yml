# GitHub Pages deploy – nt-broker-ui (nturtas)
# Repo Settings → Pages → Build and deployment: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm ci
      - name: Install nt-broker-ui dependencies
        run: cd nt-broker-ui && npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Quality gates
        run: npm run test:mixed
        env:
          CI: true
          BASE_URL: http://127.0.0.1:4173/nturtas/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm ci
      - name: Install nt-broker-ui and build
        run: |
          cd nt-broker-ui && npm ci && npm run build
      - uses: actions/upload-pages-artifact@3
        with:
          path: nt-broker-ui/dist
      - id: deploy
        uses: actions/deploy-pages@4
